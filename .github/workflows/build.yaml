name: build test

permissions:
  contents: read
  pull-requests: read

on:
  pull_request:
    branches: [main, ci-test]
    types: [opened, synchronize]
    paths:
     - 'SPECS/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: [ubuntu-latest]
    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0
    - name: get changed files
      id: changed-files
      uses: tj-actions/changed-files@e0021407031f5be11a464abee9a0776171c79891 # v47.0.1
      with:
        files_yaml: |
          specs:
            - SPECS/**
    - name: cache
      id:   cache
      uses: actions/cache@v4
      with:
        path: |
          SPECS/.pbuild
          SPECS/_build.x86_64
        key: ${{ runner.os }}-${{ hashFiles('.github/build/_config', '.github/build/pbuild.patch', '.github/workflows/build.yaml') }}
        restore-keys: |
          ${{ runner.os }}-
    - name: Install tools
      run: |
        echo "deb http://download.opensuse.org/repositories/openSUSE:/Tools/xUbuntu_24.04/ /" | sudo tee /etc/apt/sources.list.d/obs.list
        wget -qO - http://download.opensuse.org/repositories/openSUSE:/Tools/xUbuntu_24.04/Release.key | sudo apt-key add -
        sudo apt update && sudo apt install osc obs-build libwww-perl libxml-parser-perl libtry-tiny-perl liblwp-protocol-https-perl -y
    - name: apply pbuild patch
      run: |
        set -euxo pipefail
        patch_file="$GITHUB_WORKSPACE/.github/build/pbuild.patch"
        pbuild_libdir=""
        for d in /usr/lib/build /usr/lib/obs-build; do
          if [ -f "$d/pbuild" ] && [ -f "$d/PBuild/Job.pm" ] && [ -f "$d/PBuild/Expand.pm" ]; then
            pbuild_libdir="$d"
            break
          fi
        done
        if [ -z "$pbuild_libdir" ]; then
          echo "Unable to locate pbuild perl modules directory"
          exit 1
        fi
        sudo patch --forward --batch --directory="$pbuild_libdir" --strip=1 -i "$patch_file" || true
        grep -q "sub set_genbuildreqs" "$pbuild_libdir/PBuild/Job.pm"
        grep -q "sub load_genbuildreqs" "$pbuild_libdir/PBuild/Job.pm"
        grep -q "load_genbuildreqs" "$pbuild_libdir/pbuild"
    - name: Limit the number of compilations
      if: steps.changed-files.outputs.specs_any_changed == 'true'
      run: |
        set -x
        all_file="${{ steps.changed-files.outputs.specs_all_changed_files }}"
        for i in $all_file; do
         p=$(basename $(dirname $i))
         echo $p
         echo "BuildFlags: onlybuild:$p" >> ./.github/build/_config
        done
    - name: Build package(s)
      run: |
        set -euxo pipefail
        cp .github/build/* SPECS
        cd SPECS
        stamp_file="$(mktemp)"
        trap 'rm -f "$stamp_file"' EXIT
        if ! sudo pbuild --vm-type=chroot --preset x86_64 --showlog --root=/tmp/b; then
          sudo pbuild --preset x86_64 --result || true
          if find _build.x86_64 -type f -name _generated_buildreqs -newer "$stamp_file" -print -quit | grep -q .; then
            echo "Detected generated build requirements, retrying pbuild once"
            sudo pbuild --vm-type=chroot --preset x86_64 --showlog --root=/tmp/b || (sudo pbuild --preset x86_64 --result && exit 1)
          else
            exit 1
          fi
        fi
    - name: get result
      id: result
      if: steps.changed-files.outputs.specs_any_changed == 'true'
      run: |
        set -x
        all_file="${{ steps.changed-files.outputs.specs_all_changed_files }}"
        {
          echo 'paths<<EOF'
          for i in $all_file; do
           p=$(basename $(dirname $i))
           echo "SPECS/_build.x86_64/$p"
          done
          echo 'EOF'
        } >> "$GITHUB_OUTPUT"
    - uses: actions/upload-artifact@v4
      with:
       name: PR${{ github.event.pull_request.number }}-build-packages-results
       path: ${{ steps.result.outputs.paths }}
       if-no-files-found: error
